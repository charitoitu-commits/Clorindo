<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserva online | Clorindo Café</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="topbar">
  <a href="index.html">
    <img src="img/logo.png" alt="Clorindo Café" class="logo">
  </a>

  <button class="hamburguesa" onclick="toggleMenu()">☰</button>

  <nav class="navbar" id="navbar">
    <a href="sobre-nosotros.html">Sobre nosotros</a>
    <a href="menu.html">Menú</a>
    <a href="tienda.html">Tienda online</a>
    <a href="contacto.html">Contacto</a>
    <a href="reserva.html">Reservar</a>
    <a href="galeria.html">Galeria</a>
  </nav>
</header>

<main class="reserva-page">

  <section class="reserva-titulo">
    <h1>Reserva online</h1>
    <p>Completá tus datos para reservar una mesa en Clorindo Café.</p>
  </section>

  <section class="reserva-contenedor">

    <form class="form-reserva" onsubmit="enviarReserva(event)">

      <div class="campo">
        <label for="nombre">Nombre y apellido</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required>
      </div>

      <div class="campo">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" required>
      </div>

      <div class="campo">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" required>
      </div>

      <div class="campo">
        <label for="horario">Horario</label>
        <input type="time" id="horario" required>
      </div>

      <div class="campo">
        <label for="personas">Cantidad de personas</label>
        <input type="number" id="personas" min="1" max="10" required>
      </div>

      <div class="campo campo-completo">
        <label for="comentarios">Observaciones o comentarios</label>
        <textarea id="comentarios" rows="5" placeholder="Ejemplo: mesa afuera, silla para bebé, cumpleaños, etc."></textarea>
      </div>

      <button type="submit">Confirmar reserva</button>

      <p id="mensaje-reserva"></p>

    </form>

  </section>

</main>

<footer class="footer">
  <h3>Clorindo Café</h3>
</footer>

<script src="script.js"></script>
</body>
</html>
